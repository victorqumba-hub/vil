services:
  - type: web
    name: vil-integrated-backend
    env: python
    region: frankfurt # Or your preferred region
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set in Render dashboard (Supabase URL)
      - key: REDIS_URL
        sync: false # Set in Render dashboard (Upstash URL)
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
