services:
  - type: web
    name: vil-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        sync: false # Set in Render dashboard
      - key: REDIS_URL
        fromService:
          name: vil-redis
          type: redis
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*" # Update after frontend deployment
      - key: ML_SERVICE_URL
        value: "http://localhost:8001"

  - type: worker
    name: vil-ml-service
    env: python
    buildCommand: pip install -r ml_service/requirements.txt
    startCommand: cd ml_service && uvicorn app.main:app --host 0.0.0.0 --port 8001
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: vil-redis
          type: redis

  - type: redis
    name: vil-redis
    plan: free # Use free tier for starting out
    ipAllowList: [] # Only allow internal traffic
